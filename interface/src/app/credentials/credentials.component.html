<div class="page-container">
  <div class="credentials-card">
    <div class="user-section" *ngIf="signedIn">
      <div class="user-avatar">
        <mat-icon>person</mat-icon>
      </div>
      <div class="user-info">
        <h2 class="page-title">{{ user.firstName }} {{ user.lastName }}</h2>
        <p class="page-subtitle">Signed in to Igikoni</p>
      </div>
      <button mat-stroked-button color="warn" class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Log out
      </button>
    </div>

    <div class="auth-section" *ngIf="!signedIn">
      <mat-icon class="auth-icon">account_circle</mat-icon>
      <h2 class="page-title">Account</h2>
      <p class="page-subtitle">Sign in or create an account to place orders</p>
      <div class="auth-buttons">
        <button mat-raised-button color="primary" (click)="login()">Sign in</button>
        <button mat-stroked-button (click)="register()">Create account</button>
      </div>
    </div>

    <p class="back-link">
      <span class="link-action" (click)="home()">
        <mat-icon>arrow_back</mat-icon>
        Back to home
      </span>
    </p>
  </div>
</div>
