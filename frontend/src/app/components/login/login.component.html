<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your Igikoni account</p>

    <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="form.email" required #email="ngModel" />
        <mat-error *ngIf="email.errors?.['required']">Email is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" />
        <mat-error *ngIf="password.errors?.['required']">Password is required</mat-error>
        <mat-error *ngIf="password.errors?.['minlength']">Password must be at least 6 characters</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" class="submit-btn" type="submit">Sign in</button>

      <div *ngIf="f.submitted && isLoginFailed" class="form-alert form-alert--error">
        Login failed: {{ errorMessage }}
      </div>
    </form>

    <div class="form-alert form-alert--success" *ngIf="isLoggedIn">
      Logged in as {{ roles }}.
    </div>

    <p class="auth-footer" *ngIf="!isLoggedIn">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
