<header class="app-header">
  <div class="header-inner">
    <div class="brand" (click)="home()">
      <img src="assets/logo.jpeg" alt="Igikoni logo" class="brand-logo">
      <span class="brand-name">Igikoni</span>
    </div>

    <div class="search-bar">
      <mat-icon class="search-icon">search</mat-icon>
      <input
        type="text"
        class="search-input"
        placeholder="Search restaurants..."
        #filter
        (keyup.enter)="filterResults(filter.value)">
      <button class="search-button" (click)="filterResults(filter.value)">Search</button>
    </div>

    <nav class="header-actions">
      <button class="action-btn" (click)="profile()" matTooltip="Account">
        <mat-icon>person</mat-icon>
        <span class="action-label" *ngIf="isLoggedIn">{{ user.firstName }}</span>
      </button>
      <button class="action-btn cart-btn" (click)="navigateToCart()" matTooltip="Cart">
        <mat-icon>shopping_cart</mat-icon>
        <span class="cart-badge" *ngIf="cartItems.length > 0">{{ cartItems.length }}</span>
      </button>
    </nav>
  </div>
</header>
