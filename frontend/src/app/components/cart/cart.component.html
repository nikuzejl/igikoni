<div class="page-container" *ngIf="!showSpinner">
  <h2 class="page-title">Your cart</h2>
  <p class="page-subtitle" *ngIf="cartItems.length > 0">{{ cartItems.length }} item(s)</p>

  <div *ngIf="cartItems.length == 0" class="empty-state">
    <mat-icon>shopping_cart</mat-icon>
    <p>Your cart is empty.</p>
    <span class="link-action" routerLink="/home">Browse restaurants</span>
  </div>

  <div *ngIf="cartItems.length > 0" class="cart-panel">
    <ul class="cart-items">
      <li *ngFor="let item of cartItems" class="cart-item">
        <span class="cart-item__name">{{ item.name }}</span>
        <span class="cart-item__price">{{ item.price | currency }}</span>
        <button class="cart-item__remove" (click)="removeItem(item)" matTooltip="Remove">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </li>
      <li class="cart-item cart-item--total">
        <span>Total</span>
        <span class="cart-item__price">{{ totalPrice | currency }}</span>
        <span></span>
      </li>
    </ul>
    <button mat-raised-button color="primary" class="checkout-btn"
      (click)="pay(getOrderSummary(cartItems), totalPrice, 1)">
      Proceed to payment
    </button>
  </div>
</div>

<app-spinner *ngIf="showSpinner"></app-spinner>
